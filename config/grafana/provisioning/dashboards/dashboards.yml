# Grafana dashboard provisioning — loads JSON dashboards from /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: Climate Tracker
    orgId: 1
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
